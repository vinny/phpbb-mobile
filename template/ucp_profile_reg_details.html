<!-- INCLUDE ucp_header.html -->

<form id="ucp" method="post" action="{S_UCP_ACTION}"{S_FORM_ENCTYPE}>

	<div class="flex items-center justify-between mb-4 border-b border-primary/10 pb-4">
		<h2 class="text-base sm:text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
			<span class="material-symbols-outlined text-[20px] text-primary">manage_accounts</span>
			{L_TITLE}
		</h2>
	</div>

	<!-- IF S_FORCE_PASSWORD -->
		<div class="mb-6 rounded-xl border border-red-200 bg-red-50 p-4 text-sm text-red-600 dark:border-red-900/30 dark:bg-red-900/10 dark:text-red-400 font-medium">
			{L_FORCE_PASSWORD_EXPLAIN}
		</div>
	<!-- ENDIF -->

	<!-- IF ERROR -->
		<div class="mb-6 rounded-xl border border-red-200 bg-red-50 p-4 text-sm text-red-600 dark:border-red-900/30 dark:bg-red-900/10 dark:text-red-400 font-medium">
			{ERROR}
		</div>
	<!-- ENDIF -->

	<div class="space-y-5">
		<!-- EVENT ucp_profile_register_details_before -->
		
		<div class="flex flex-col gap-1.5">
			<label <!-- IF S_CHANGE_USERNAME -->for="username"<!-- ENDIF --> class="block text-sm font-medium text-slate-700 dark:text-slate-300">
				{L_USERNAME}{L_COLON}
				<span class="block text-xs text-slate-500 dark:text-slate-400 font-normal mt-0.5">{L_USERNAME_EXPLAIN}</span>
			</label>
			<!-- IF S_CHANGE_USERNAME -->
				<input type="text" name="username" id="username" value="{USERNAME}" title="{L_USERNAME}" class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary text-sm text-slate-900 dark:text-white outline-none transition-all placeholder:text-slate-400" />
			<!-- ELSE -->
				<strong class="text-slate-800 dark:text-white bg-slate-50 dark:bg-slate-900/50 px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 inline-block">{USERNAME}</strong>
			<!-- ENDIF -->
		</div>

		<div class="flex flex-col gap-1.5">
			<label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_EMAIL_ADDRESS}{L_COLON}</label>
			<!-- IF S_CHANGE_EMAIL -->
				<div class="relative">
					<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
						<span class="material-symbols-outlined text-[18px]">mail</span>
					</span>
					<input type="email" name="email" id="email" maxlength="100" value="{EMAIL}" title="{L_EMAIL_ADDRESS}" autocomplete="off" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary text-sm text-slate-900 dark:text-white outline-none transition-all placeholder:text-slate-400" />
				</div>
			<!-- ELSE -->
				<strong class="text-slate-800 dark:text-white bg-slate-50 dark:bg-slate-900/50 px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 inline-block">{EMAIL}</strong>
			<!-- ENDIF -->
		</div>

		<!-- IF S_CHANGE_PASSWORD -->
			<div class="flex flex-col gap-1.5">
				<label for="new_password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">
					{L_NEW_PASSWORD}{L_COLON}
					<span class="block text-xs text-slate-500 dark:text-slate-400 font-normal mt-0.5">{L_CHANGE_PASSWORD_EXPLAIN}</span>
				</label>
				<input type="password" name="new_password" id="new_password" maxlength="255" value="{NEW_PASSWORD}" title="{L_CHANGE_PASSWORD}" autocomplete="off" class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary text-sm text-slate-900 dark:text-white outline-none transition-all placeholder:text-slate-400" />
			</div>

			<div class="flex flex-col gap-1.5">
				<label for="password_confirm" class="block text-sm font-medium text-slate-700 dark:text-slate-300">
					{L_CONFIRM_PASSWORD}{L_COLON}
					<span class="block text-xs text-slate-500 dark:text-slate-400 font-normal mt-0.5">{L_CONFIRM_PASSWORD_EXPLAIN}</span>
				</label>
				<input type="password" name="password_confirm" id="password_confirm" maxlength="255" value="{PASSWORD_CONFIRM}" title="{L_CONFIRM_PASSWORD}" autocomplete="off" class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary text-sm text-slate-900 dark:text-white outline-none transition-all placeholder:text-slate-400" />
			</div>
		<!-- ENDIF -->
		<!-- EVENT ucp_profile_register_details_after -->

		<!-- Current Password Confirmation Panel -->
		<div class="mt-6 rounded-xl border border-amber-200 bg-amber-50/50 p-4 sm:p-5 shadow-sm dark:border-amber-900/30 dark:bg-amber-900/10">
			<div class="flex flex-col gap-1.5">
				<label for="cur_password" class="block text-sm font-bold text-amber-800 dark:text-amber-400">
					<span class="flex items-center gap-1.5 mb-1"><span class="material-symbols-outlined text-[18px]">lock</span> {L_CURRENT_PASSWORD}{L_COLON}</span>
					<span class="block text-xs text-amber-700 dark:text-amber-500 font-normal mt-0.5"><!-- IF S_CHANGE_PASSWORD -->{L_CURRENT_CHANGE_PASSWORD_EXPLAIN}<!-- ELSE -->{L_CURRENT_PASSWORD_EXPLAIN}<!-- ENDIF --></span>
				</label>
				<div class="relative mt-2">
					<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-amber-400 dark:text-amber-600/50">
						<span class="material-symbols-outlined text-[18px]">key</span>
					</span>
					<input type="password" name="cur_password" id="cur_password" maxlength="255" value="{CUR_PASSWORD}" title="{L_CURRENT_PASSWORD}" autocomplete="off" class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-amber-300 dark:border-amber-800/50 rounded-lg focus:ring-1 focus:ring-amber-500 focus:border-amber-500 text-sm text-slate-900 dark:text-white outline-none transition-all placeholder:text-slate-400 shadow-sm" />
				</div>
			</div>
		</div>

	</div>

	<div class="mt-8 flex flex-col sm:flex-row sm:justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-700/50">
		<input type="reset" value="{L_RESET}" name="reset" class="w-full sm:w-auto py-3 sm:py-2 px-6 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-semibold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700 cursor-pointer" />
		<input type="submit" name="submit" value="{L_SUBMIT}" class="w-full sm:w-auto py-3 sm:py-2 px-6 rounded-lg bg-primary text-white font-semibold text-sm shadow-sm hover:bg-primary/90 transition-colors cursor-pointer" />
		{S_HIDDEN_FIELDS}
		{S_FORM_TOKEN}
	</div>

</form>

<!-- INCLUDE ucp_footer.html -->
