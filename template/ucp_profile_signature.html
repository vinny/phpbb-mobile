<!-- INCLUDE ucp_header.html -->

<form id="postform" method="post" action="{S_UCP_ACTION}"{S_FORM_ENCTYPE}>

	<div class="flex items-center justify-between mb-4 border-b border-primary/10 pb-4">
		<h2 class="text-base sm:text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
			<span class="material-symbols-outlined text-[20px] text-primary">draw</span>
			{L_TITLE}
		</h2>
	</div>

	<!-- IF SIGNATURE_PREVIEW != '' -->
		<div class="mb-6 bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
			<h3 class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-100 dark:border-slate-700/50 pb-2">{L_SIGNATURE_PREVIEW}</h3>
			<div class="postbody">
				<div class="signature standalone text-sm text-slate-700 dark:text-slate-300 leading-relaxed">{SIGNATURE_PREVIEW}</div>
			</div>
		</div>
	<!-- ENDIF -->

	<div class="space-y-6">
		<p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800">
			{L_SIGNATURE_EXPLAIN}
		</p>

		<!-- DEFINE $SIG_EDIT = 1 -->
		<!-- INCLUDE posting_editor.html -->
		
		<div class="border-t border-slate-100 dark:border-slate-700/50 pt-6">
			<h3 class="text-base font-bold text-slate-800 dark:text-white mb-4 flex items-center gap-2">
				<span class="material-symbols-outlined text-[18px] text-primary">toggle_on</span>
				{L_OPTIONS}
			</h3>
			<div class="flex flex-col gap-3 ml-1">
				{% EVENT ucp_profile_signature_posting_editor_options_prepend %}
				<!-- IF S_BBCODE_ALLOWED -->
					<label for="disable_bbcode" class="flex items-center gap-3 cursor-pointer group w-fit">
						<input type="checkbox" name="disable_bbcode" id="disable_bbcode"{S_BBCODE_CHECKED} class="w-4 h-4 rounded border-slate-300 text-primary shadow-sm focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-900 dark:checked:bg-primary" />
						<span class="text-sm font-medium text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors">{L_DISABLE_BBCODE}</span>
					</label>
				<!-- ENDIF -->
				<!-- IF S_SMILIES_ALLOWED -->
					<label for="disable_smilies" class="flex items-center gap-3 cursor-pointer group w-fit">
						<input type="checkbox" name="disable_smilies" id="disable_smilies"{S_SMILIES_CHECKED} class="w-4 h-4 rounded border-slate-300 text-primary shadow-sm focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-900 dark:checked:bg-primary" />
						<span class="text-sm font-medium text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors">{L_DISABLE_SMILIES}</span>
					</label>
				<!-- ENDIF -->
				<!-- IF S_LINKS_ALLOWED -->
					<label for="disable_magic_url" class="flex items-center gap-3 cursor-pointer group w-fit">
						<input type="checkbox" name="disable_magic_url" id="disable_magic_url"{S_MAGIC_URL_CHECKED} class="w-4 h-4 rounded border-slate-300 text-primary shadow-sm focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-900 dark:checked:bg-primary" />
						<span class="text-sm font-medium text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors">{L_DISABLE_MAGIC_URL}</span>
					</label>
				<!-- ENDIF -->
			</div>
		</div>
	</div>

	<div class="mt-8 flex flex-col sm:flex-row sm:justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-700/50">
		<input type="submit" name="preview" value="{L_PREVIEW}" class="w-full sm:w-auto py-3 sm:py-2 px-6 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-semibold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700 cursor-pointer" />
		<input type="submit" name="submit" value="{L_SUBMIT}" class="w-full sm:w-auto py-3 sm:py-2 px-6 rounded-lg bg-primary text-white font-semibold text-sm shadow-sm hover:bg-primary/90 transition-colors cursor-pointer" />
		{S_HIDDEN_FIELDS}
		{S_FORM_TOKEN}
	</div>

</form>

<!-- INCLUDE ucp_footer.html -->
