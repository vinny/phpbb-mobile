	</div> <!-- close page-body -->

	<div class="mt-8 pt-4 pb-4 text-center border-t border-slate-200 dark:border-slate-800" role="contentinfo">
		<p class="text-xs text-slate-500">
			{{ CREDIT_LINE }}
		</p>
		{% if TRANSLATION_INFO %}
			<p class="text-xs text-slate-500 mt-1">
				{{ TRANSLATION_INFO }}
			</p>
		{% endif %}
		{% if DEBUG_OUTPUT %}
			<p class="text-[10px] text-slate-400 mt-2">
				{{ DEBUG_OUTPUT }}
			</p>
		{% endif %}
	</div>

    <div id="darkenwrapper" class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm" data-ajax-error-title="{L_AJAX_ERROR_TITLE}" data-ajax-error-text="{L_AJAX_ERROR_TEXT}" data-ajax-error-text-abort="{L_AJAX_ERROR_TEXT_ABORT}" data-ajax-error-text-timeout="{L_AJAX_ERROR_TEXT_TIMEOUT}" data-ajax-error-text-parsererror="{L_AJAX_ERROR_TEXT_PARSERERROR}" style="display: none;">
		<div id="darken" class="absolute inset-0">&nbsp;</div>
	</div>

	<div id="phpbb_alert" class="phpbb_alert fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[101] w-[90%] max-w-sm sm:max-w-md bg-white dark:bg-slate-800 rounded-xl shadow-2xl overflow-hidden" data-l-err="{L_ERROR}" data-l-timeout-processing-req="{L_TIMEOUT_PROCESSING_REQ}" style="display: none;">
		<a href="#" class="alert_close absolute top-3 right-4 text-slate-400 hover:text-red-500 z-10 transition-colors">
			<span class="material-symbols-outlined text-2xl">close</span>
		</a>
		<h3 class="alert_title px-6 py-4 border-b border-slate-100 dark:border-slate-700/50 bg-slate-50 dark:bg-slate-800/80 text-lg font-bold text-slate-900 dark:text-white m-0">&nbsp;</h3>
		<p class="alert_text p-6 text-slate-700 dark:text-slate-300 font-medium"></p>
	</div>
	
	<div id="phpbb_confirm" class="phpbb_alert fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[101] w-[90%] max-w-sm sm:max-w-md bg-white dark:bg-slate-800 rounded-xl shadow-2xl overflow-hidden" style="display: none;">
		<a href="#" class="alert_close absolute top-3 right-4 text-slate-400 hover:text-red-500 z-10 transition-colors">
			<span class="material-symbols-outlined text-2xl">close</span>
		</a>
		<div class="alert_text p-6 text-slate-700 dark:text-slate-300 font-medium pt-8 pb-6"></div>
	</div>
</div>
