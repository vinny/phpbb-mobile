<!-- INCLUDE ucp_header.html -->

<form id="ucp" method="post" action="{S_UCP_ACTION}"{S_FORM_ENCTYPE}>

	<div class="flex items-center justify-between mb-6 border-b border-primary/10 pb-4">
		<h2 class="text-base sm:text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
			<span class="material-symbols-outlined text-[20px] text-primary">visibility</span>
			{L_TITLE}
		</h2>
	</div>

	<!-- IF ERROR -->
		<div class="mb-6 rounded-xl border border-red-200 bg-red-50 p-4 text-sm text-red-600 dark:border-red-900/30 dark:bg-red-900/10 dark:text-red-400 font-medium">
			{ERROR}
		</div>
	<!-- ENDIF -->

	<div class="space-y-6">
		<!-- EVENT ucp_prefs_view_radio_buttons_prepend -->
		
		<div class="flex flex-col gap-2">
			<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_VIEW_IMAGES}{L_COLON}</label>
			<div class="flex items-center gap-4">
				<label for="images1" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="images" id="images1" value="1"<!-- IF S_IMAGES --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_YES}</span>
				</label>
				<label for="images0" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="images" id="images0" value="0"<!-- IF not S_IMAGES --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_NO}</span>
				</label>
			</div>
		</div>

		<div class="flex flex-col gap-2">
			<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_VIEW_FLASH}{L_COLON}</label>
			<div class="flex items-center gap-4">
				<label for="flash1" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="flash" id="flash1" value="1"<!-- IF S_FLASH --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_YES}</span>
				</label>
				<label for="flash0" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="flash" id="flash0" value="0"<!-- IF not S_FLASH --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_NO}</span>
				</label>
			</div>
		</div>

		<div class="flex flex-col gap-2">
			<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_VIEW_SMILIES}{L_COLON}</label>
			<div class="flex items-center gap-4">
				<label for="smilies1" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="smilies" id="smilies1" value="1"<!-- IF S_SMILIES --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_YES}</span>
				</label>
				<label for="smilies0" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="smilies" id="smilies0" value="0"<!-- IF not S_SMILIES --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_NO}</span>
				</label>
			</div>
		</div>

		<div class="flex flex-col gap-2">
			<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_VIEW_SIGS}{L_COLON}</label>
			<div class="flex items-center gap-4">
				<label for="sigs1" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="sigs" id="sigs1" value="1"<!-- IF S_SIGS --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_YES}</span>
				</label>
				<label for="sigs0" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="sigs" id="sigs0" value="0"<!-- IF not S_SIGS --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_NO}</span>
				</label>
			</div>
		</div>

		<div class="flex flex-col gap-2">
			<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_VIEW_AVATARS}{L_COLON}</label>
			<div class="flex items-center gap-4">
				<label for="avatars1" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="avatars" id="avatars1" value="1"<!-- IF S_AVATARS --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_YES}</span>
				</label>
				<label for="avatars0" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="avatars" id="avatars0" value="0"<!-- IF not S_AVATARS --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_NO}</span>
				</label>
			</div>
		</div>

		<!-- IF S_CHANGE_CENSORS -->
			<div class="flex flex-col gap-2 border-t border-slate-100 dark:border-slate-700/50 pt-5 mt-2">
				<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_DISABLE_CENSORS}{L_COLON}</label>
				<div class="flex items-center gap-4">
					<label for="wordcensor1" class="flex items-center gap-2 cursor-pointer group">
						<input type="radio" name="wordcensor" id="wordcensor1" value="1"<!-- IF S_DISABLE_CENSORS --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
						<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_YES}</span>
					</label>
					<label for="wordcensor0" class="flex items-center gap-2 cursor-pointer group">
						<input type="radio" name="wordcensor" id="wordcensor0" value="0"<!-- IF not S_DISABLE_CENSORS --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
						<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_NO}</span>
					</label>
				</div>
			</div>
		<!-- ENDIF -->

		<!-- EVENT ucp_prefs_view_radio_buttons_append -->

		<div class="border-t border-slate-100 dark:border-slate-700/50 pt-5 mt-2 space-y-5">
			<!-- EVENT ucp_prefs_view_select_menu_prepend -->
			<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
				<div class="flex flex-col gap-1.5 [&>select]:w-full [&>select]:rounded-lg [&>select]:border [&>select]:border-slate-300 [&>select]:bg-slate-50 [&>select]:py-2.5 [&>select]:pl-3 [&>select]:pr-8 [&>select]:text-sm [&>select]:text-slate-900 [&>select]:focus:border-primary [&>select]:focus:outline-none [&>select]:focus:ring-1 [&>select]:focus:ring-primary [&>select]:dark:border-slate-600 [&>select]:dark:bg-slate-900/50 [&>select]:dark:text-white [&>select]:transition-colors">
					<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_VIEW_TOPICS_DAYS}{L_COLON}</label>
					{S_TOPIC_SORT_DAYS}
				</div>
				<div class="flex flex-col gap-1.5 [&>select]:w-full [&>select]:rounded-lg [&>select]:border [&>select]:border-slate-300 [&>select]:bg-slate-50 [&>select]:py-2.5 [&>select]:pl-3 [&>select]:pr-8 [&>select]:text-sm [&>select]:text-slate-900 [&>select]:focus:border-primary [&>select]:focus:outline-none [&>select]:focus:ring-1 [&>select]:focus:ring-primary [&>select]:dark:border-slate-600 [&>select]:dark:bg-slate-900/50 [&>select]:dark:text-white [&>select]:transition-colors">
					<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_VIEW_TOPICS_KEY}{L_COLON}</label>
					{S_TOPIC_SORT_KEY}
				</div>
				<div class="flex flex-col gap-1.5 [&>select]:w-full [&>select]:rounded-lg [&>select]:border [&>select]:border-slate-300 [&>select]:bg-slate-50 [&>select]:py-2.5 [&>select]:pl-3 [&>select]:pr-8 [&>select]:text-sm [&>select]:text-slate-900 [&>select]:focus:border-primary [&>select]:focus:outline-none [&>select]:focus:ring-1 [&>select]:focus:ring-primary [&>select]:dark:border-slate-600 [&>select]:dark:bg-slate-900/50 [&>select]:dark:text-white [&>select]:transition-colors">
					<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_VIEW_TOPICS_DIR}{L_COLON}</label>
					{S_TOPIC_SORT_DIR}
				</div>
			</div>
		</div>

		<div class="border-t border-slate-100 dark:border-slate-700/50 pt-5 mt-2 space-y-5">
			<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
				<div class="flex flex-col gap-1.5 [&>select]:w-full [&>select]:rounded-lg [&>select]:border [&>select]:border-slate-300 [&>select]:bg-slate-50 [&>select]:py-2.5 [&>select]:pl-3 [&>select]:pr-8 [&>select]:text-sm [&>select]:text-slate-900 [&>select]:focus:border-primary [&>select]:focus:outline-none [&>select]:focus:ring-1 [&>select]:focus:ring-primary [&>select]:dark:border-slate-600 [&>select]:dark:bg-slate-900/50 [&>select]:dark:text-white [&>select]:transition-colors">
					<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_VIEW_POSTS_DAYS}{L_COLON}</label>
					{S_POST_SORT_DAYS}
				</div>
				<div class="flex flex-col gap-1.5 [&>select]:w-full [&>select]:rounded-lg [&>select]:border [&>select]:border-slate-300 [&>select]:bg-slate-50 [&>select]:py-2.5 [&>select]:pl-3 [&>select]:pr-8 [&>select]:text-sm [&>select]:text-slate-900 [&>select]:focus:border-primary [&>select]:focus:outline-none [&>select]:focus:ring-1 [&>select]:focus:ring-primary [&>select]:dark:border-slate-600 [&>select]:dark:bg-slate-900/50 [&>select]:dark:text-white [&>select]:transition-colors">
					<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_VIEW_POSTS_KEY}{L_COLON}</label>
					{S_POST_SORT_KEY}
				</div>
				<div class="flex flex-col gap-1.5 [&>select]:w-full [&>select]:rounded-lg [&>select]:border [&>select]:border-slate-300 [&>select]:bg-slate-50 [&>select]:py-2.5 [&>select]:pl-3 [&>select]:pr-8 [&>select]:text-sm [&>select]:text-slate-900 [&>select]:focus:border-primary [&>select]:focus:outline-none [&>select]:focus:ring-1 [&>select]:focus:ring-primary [&>select]:dark:border-slate-600 [&>select]:dark:bg-slate-900/50 [&>select]:dark:text-white [&>select]:transition-colors">
					<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_VIEW_POSTS_DIR}{L_COLON}</label>
					{S_POST_SORT_DIR}
				</div>
			</div>
			<!-- EVENT ucp_prefs_view_select_menu_append -->
		</div>

	</div>

	<div class="mt-8 flex flex-col sm:flex-row sm:justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-700/50">
		<input type="reset" value="{L_RESET}" name="reset" class="w-full sm:w-auto py-3 sm:py-2 px-6 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-semibold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700 cursor-pointer" />
		<input type="submit" name="submit" value="{L_SUBMIT}" class="w-full sm:w-auto py-3 sm:py-2 px-6 rounded-lg bg-primary text-white font-semibold text-sm shadow-sm hover:bg-primary/90 transition-colors cursor-pointer" />
		{S_HIDDEN_FIELDS}
		{S_FORM_TOKEN}
	</div>

</form>

<!-- INCLUDE ucp_footer.html -->
