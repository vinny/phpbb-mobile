<!-- INCLUDE mcp_header.html -->

<form method="post" id="mcp" action="{U_POST_ACTION}">

<h2 class="text-xl font-bold text-slate-900 dark:text-white mb-4">{L_TITLE}</h2>

<div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden mb-6">
	<div class="p-4 sm:p-6 space-y-4">

		<fieldset>
			<div class="flex flex-col sm:flex-row sm:items-center gap-4">
				<label for="username" class="font-semibold text-slate-700 dark:text-slate-300 w-full sm:w-1/3">{L_SELECT_USER}{L_COLON}</label>
				<div class="flex-1 flex flex-col sm:flex-row items-start sm:items-center gap-3 w-full">
					<input name="username" id="username" type="text" class="w-full sm:w-auto flex-1 px-3 py-2 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-slate-900 dark:text-white" />
					<a href="{U_FIND_USERNAME}" onclick="find_username(this.href); return false;" class="text-sm font-semibold text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 transition-colors">{L_FIND_USERNAME}</a>
				</div>
			</div>
		</fieldset>

	</div>
</div>

<fieldset class="flex justify-start mb-6">
	<input type="submit" name="submituser" value="{L_SUBMIT}" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-sm transition-colors cursor-pointer" />
	{S_FORM_TOKEN}
</fieldset>
</form>

<!-- INCLUDE mcp_footer.html -->
