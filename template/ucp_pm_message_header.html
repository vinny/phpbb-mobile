<div class="flex items-center justify-between mb-6 border-b border-primary/10 pb-4">
	<h2 class="text-base sm:text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
		<span class="material-symbols-outlined text-[20px] text-primary">forum</span>
		{L_TITLE}<!-- IF CUR_FOLDER_NAME -->{L_COLON} {CUR_FOLDER_NAME}<!-- ENDIF -->
	</h2>
</div>

<form id="viewfolder" method="post" action="{S_PM_ACTION}">

<div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden mb-6">
	<div class="p-6 sm:p-8">
	
	<!-- IF FOLDER_STATUS and FOLDER_MAX_MESSAGES neq 0 -->
	<div class="mb-6 bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800 text-sm text-slate-600 dark:text-slate-400 font-medium">
		{FOLDER_STATUS}
	</div>
	<!-- ENDIF -->

	<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
		<div class="flex flex-wrap items-center gap-2">
			<!-- IF U_POST_REPLY_PM or U_POST_NEW_TOPIC or U_FORWARD_PM -->
				<!-- IF U_POST_REPLY_PM -->
					<a title="{L_POST_REPLY_PM}" href="{U_POST_REPLY_PM}" class="inline-flex items-center gap-2 px-4 py-2 bg-primary hover:bg-primary/90 text-white font-bold text-sm rounded-lg shadow-sm transition-colors">
						<span class="material-symbols-outlined text-[18px]">reply</span> <span>{L_BUTTON_PM_REPLY}</span>
					</a>
				<!-- ELSEIF U_POST_NEW_TOPIC -->
					<a href="{U_POST_NEW_TOPIC}" accesskey="n" title="{L_UCP_PM_COMPOSE}" class="inline-flex items-center gap-2 px-4 py-2 bg-primary hover:bg-primary/90 text-white font-bold text-sm rounded-lg shadow-sm transition-colors">
						<span class="material-symbols-outlined text-[18px]">edit</span> <span>{L_BUTTON_PM_NEW}</span>
					</a>
				<!-- ENDIF -->
				
				<!-- IF U_FORWARD_PM -->
					<a title="{L_POST_FORWARD_PM}" href="{U_FORWARD_PM}" class="inline-flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold text-sm rounded-lg shadow-sm transition-colors">
						<span class="material-symbols-outlined text-[18px]">forward</span> <span class="hidden sm:inline">{L_BUTTON_PM_FORWARD}</span>
					</a>
				<!-- ENDIF -->
				
				<!-- IF U_POST_REPLY_PM and S_PM_RECIPIENTS gt 1 -->
					<a title="{L_REPLY_TO_ALL}" href="{U_POST_REPLY_ALL}" class="inline-flex items-center gap-2 px-4 py-2 bg-primary hover:bg-primary/90 text-white font-bold text-sm rounded-lg shadow-sm transition-colors">
						<span class="material-symbols-outlined text-[18px]">reply_all</span> <span>{L_BUTTON_PM_REPLY_ALL}</span>
					</a>
				<!-- ENDIF -->
			<!-- ENDIF -->
			
			<!-- IF not S_IS_BOT and U_PRINT_PM -->
				<div class="relative group">
					<button title="{L_PM_TOOLS}" type="button" class="inline-flex items-center gap-1.5 px-3 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold text-sm rounded-lg shadow-sm transition-colors">
						<span class="material-symbols-outlined text-[18px]">build</span>
						<span class="material-symbols-outlined text-[18px]">arrow_drop_down</span>
					</button>
					<div class="absolute left-0 mt-1 w-48 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-20 overflow-hidden">
						<!-- IF U_PRINT_PM -->
							<a href="{U_PRINT_PM}" title="{L_PRINT_PM}" accesskey="p" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
								<span class="material-symbols-outlined text-[18px] text-slate-400">print</span>
								{L_PRINT_PM}
							</a>
						<!-- ENDIF -->
					</div>
				</div>
			<!-- ENDIF -->
		</div>

		<!-- IF TOTAL_MESSAGES or S_VIEW_MESSAGE -->
			<div class="flex items-center gap-4">
				<!-- IF S_VIEW_MESSAGE -->
					<a href="{U_CURRENT_FOLDER}" class="inline-flex items-center gap-1.5 text-sm font-semibold text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
						<span class="material-symbols-outlined text-[18px] <!-- IF S_CONTENT_FLOW_BEGIN == 'right' -->rotate-180<!-- ENDIF -->">chevron_left</span>
						{L_RETURN_TO_FOLDER}
					</a>
				<!-- ELSEIF FOLDER_CUR_MESSAGES neq 0 -->
					<div class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400 font-medium">
						<!-- IF U_MARK_ALL -->
							<a href="{U_MARK_ALL}" class="hover:text-primary transition-colors">{L_PM_MARK_ALL_READ}</a>
							<span class="text-slate-300 dark:text-slate-600">&bull;</span>
						<!-- ENDIF -->
						{TOTAL_MESSAGES}
					</div>
					
					<!-- IF .pagination -->
					<div class="border-l border-slate-200 dark:border-slate-700 pl-4 hidden sm:block">
						<!-- INCLUDE pagination.html -->
					</div>
					<!-- ELSE -->
					<div class="text-sm text-slate-500 dark:text-slate-400 font-medium border-l border-slate-200 dark:border-slate-700 pl-4 hidden sm:block">
						{PAGE_NUMBER}
					</div>
					<!-- ENDIF -->
				<!-- ENDIF -->
			</div>
		<!-- ENDIF -->
	</div>
