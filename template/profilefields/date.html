<!-- BEGIN date -->
<div class="flex items-center gap-2">
	<label for="{date.FIELD_IDENT}_day" class="text-xs text-slate-500 font-medium flex items-center gap-2">{L_DAY}{L_COLON} <select name="{date.FIELD_IDENT}_day" id="{date.FIELD_IDENT}_day" class="rounded-lg border border-slate-300 bg-slate-50 py-2.5 pl-3 pr-8 text-sm text-slate-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-600 dark:bg-slate-900/50 dark:text-white transition-colors">{date.S_DAY_OPTIONS}</select></label>
	<label for="{date.FIELD_IDENT}_month" class="text-xs text-slate-500 font-medium flex items-center gap-2">{L_MONTH}{L_COLON} <select name="{date.FIELD_IDENT}_month" id="{date.FIELD_IDENT}_month" class="rounded-lg border border-slate-300 bg-slate-50 py-2.5 pl-3 pr-8 text-sm text-slate-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-600 dark:bg-slate-900/50 dark:text-white transition-colors">{date.S_MONTH_OPTIONS}</select></label>
	<label for="{date.FIELD_IDENT}_year" class="text-xs text-slate-500 font-medium flex items-center gap-2">{L_YEAR}{L_COLON} <select name="{date.FIELD_IDENT}_year" id="{date.FIELD_IDENT}_year" class="rounded-lg border border-slate-300 bg-slate-50 py-2.5 pl-3 pr-8 text-sm text-slate-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-600 dark:bg-slate-900/50 dark:text-white transition-colors">{date.S_YEAR_OPTIONS}</select></label>
</div>
<!-- END date -->
