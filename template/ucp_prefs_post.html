<!-- INCLUDE ucp_header.html -->

<form id="ucp" method="post" action="{S_UCP_ACTION}"{S_FORM_ENCTYPE}>

	<div class="flex items-center justify-between mb-6 border-b border-primary/10 pb-4">
		<h2 class="text-base sm:text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
			<span class="material-symbols-outlined text-[20px] text-primary">edit_document</span>
			{L_TITLE}
		</h2>
	</div>

	<!-- IF ERROR -->
		<div class="mb-6 rounded-xl border border-red-200 bg-red-50 p-4 text-sm text-red-600 dark:border-red-900/30 dark:bg-red-900/10 dark:text-red-400 font-medium">
			{ERROR}
		</div>
	<!-- ENDIF -->

	<div class="space-y-6">
		<!-- EVENT ucp_prefs_post_prepend -->
		
		<div class="flex flex-col gap-2">
			<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_DEFAULT_BBCODE}{L_COLON}</label>
			<div class="flex items-center gap-4">
				<label for="bbcode1" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="bbcode" id="bbcode1" value="1"<!-- IF S_BBCODE --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_YES}</span>
				</label>
				<label for="bbcode0" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="bbcode" id="bbcode0" value="0"<!-- IF not S_BBCODE --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_NO}</span>
				</label>
			</div>
		</div>

		<div class="flex flex-col gap-2">
			<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_DEFAULT_SMILIES}{L_COLON}</label>
			<div class="flex items-center gap-4">
				<label for="smilies1" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="smilies" id="smilies1" value="1"<!-- IF S_SMILIES --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_YES}</span>
				</label>
				<label for="smilies0" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="smilies" id="smilies0" value="0"<!-- IF not S_SMILIES --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_NO}</span>
				</label>
			</div>
		</div>

		{% if S_SIG_ALLOWED %}
		<div class="flex flex-col gap-2">
			<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_DEFAULT_ADD_SIG}{L_COLON}</label>
			<div class="flex items-center gap-4">
				<label for="sig1" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="sig" id="sig1" value="1"<!-- IF S_SIG --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_YES}</span>
				</label>
				<label for="sig0" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="sig" id="sig0" value="0"<!-- IF not S_SIG --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_NO}</span>
				</label>
			</div>
		</div>
		{% endif %}

		<div class="flex flex-col gap-2 border-t border-slate-100 dark:border-slate-700/50 pt-5 mt-2">
			<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">{L_DEFAULT_NOTIFY}{L_COLON}</label>
			<div class="flex items-center gap-4">
				<label for="notify1" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="notify" id="notify1" value="1"<!-- IF S_NOTIFY --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_YES}</span>
				</label>
				<label for="notify0" class="flex items-center gap-2 cursor-pointer group">
					<input type="radio" name="notify" id="notify0" value="0"<!-- IF not S_NOTIFY --> checked="checked"<!-- ENDIF --> class="w-4 h-4 text-primary bg-slate-50 border-slate-300 focus:ring-primary dark:bg-slate-900 dark:border-slate-600 dark:checked:bg-primary transition-colors cursor-pointer" />
					<span class="text-sm text-slate-700 group-hover:text-primary dark:text-slate-300 transition-colors font-medium">{L_NO}</span>
				</label>
			</div>
		</div>

		<!-- EVENT ucp_prefs_post_append -->
	</div>

	<div class="mt-8 flex flex-col sm:flex-row sm:justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-700/50">
		<input type="reset" value="{L_RESET}" name="reset" class="w-full sm:w-auto py-3 sm:py-2 px-6 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-semibold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700 cursor-pointer" />
		<input type="submit" name="submit" value="{L_SUBMIT}" class="w-full sm:w-auto py-3 sm:py-2 px-6 rounded-lg bg-primary text-white font-semibold text-sm shadow-sm hover:bg-primary/90 transition-colors cursor-pointer" />
		{S_HIDDEN_FIELDS}
		{S_FORM_TOKEN}
	</div>

</form>

<!-- INCLUDE ucp_footer.html -->
