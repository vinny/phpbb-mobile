<!-- INCLUDE mcp_header.html -->

<h2 class="text-xl font-bold text-slate-800 dark:text-slate-200 mb-6">{L_TITLE}</h2>

<form method="post" id="mcp" action="{U_POST_ACTION}">

	<div class="rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-700 dark:bg-slate-800 overflow-hidden mb-6">
		<div class="border-b border-slate-200 bg-slate-50/50 px-4 py-3 sm:px-6 sm:py-4 dark:border-slate-700 dark:bg-slate-800/50 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
			<div class="flex items-center gap-2 max-w-full">
				<div class="relative w-full sm:w-auto">
					<label for="keywords" class="sr-only">{L_SEARCH_KEYWORDS}</label>
					<span class="absolute inset-y-0 left-0 flex items-center pl-3">
						<span class="material-symbols-outlined text-[18px] text-slate-400">search</span>
					</span>
					<input type="search" class="w-full sm:w-64 rounded-lg border border-slate-300 bg-white pl-9 pr-3 py-2 text-sm text-slate-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-600 dark:bg-slate-900 dark:text-white transition-colors" name="keywords" id="keywords" value="{S_KEYWORDS}" placeholder="{L_SEARCH_KEYWORDS}" />
				</div>
				<input type="submit" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-bold text-slate-700 shadow-sm transition-colors hover:bg-slate-50 focus:outline-none dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700 cursor-pointer" name="filter" value="{L_SEARCH}" />
			</div>
			
			<div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 justify-between sm:justify-end">
				<div class="text-sm text-slate-600 dark:text-slate-400 font-medium">
					{TOTAL}
				</div>
				<!-- IF .pagination -->
					<!-- INCLUDE pagination.html -->
				<!-- ELSE -->
					<span class="text-sm font-bold text-slate-500 bg-slate-100 dark:bg-slate-900/50 px-3 py-1 rounded-lg">{PAGE_NUMBER}</span>
				<!-- ENDIF -->
			</div>
		</div>

		<div class="overflow-x-auto">
			<table class="w-full text-left text-sm text-slate-600 dark:text-slate-400">
				<thead class="bg-slate-50 dark:bg-slate-900/50 text-xs font-bold uppercase tracking-wider text-slate-500 border-b border-slate-200 dark:border-slate-700 hidden md:table-header-group">
					<tr>
						<th scope="col" class="px-4 py-3 sm:px-6">{L_USERNAME}</th>
						<th scope="col" class="px-4 py-3 sm:px-6 text-center">{L_IP}</th>
						<th scope="col" class="px-4 py-3 sm:px-6 text-center">{L_TIME}</th>
						<th scope="col" class="px-4 py-3 sm:px-6">{L_ACTION}</th>
						<!-- IF S_CLEAR_ALLOWED -->
						<th scope="col" class="px-4 py-3 sm:px-6 text-center w-12">{L_MARK}</th>
						<!-- ENDIF -->
					</tr>
				</thead>
				<tbody class="divide-y divide-slate-100 dark:divide-slate-700/50">
			<!-- IF S_LOGS -->
				<!-- BEGIN log -->
					<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors flex flex-col md:table-row <!-- IF S_CLEAR_ALLOWED -->relative<!-- ENDIF -->">
						<td class="px-4 py-3 sm:px-6 font-medium text-slate-900 dark:text-slate-200">
							<span class="md:hidden font-bold text-xs uppercase text-slate-400 block mb-1">{L_USERNAME}</span>
							{log.USERNAME}
						</td>
						<td class="px-4 py-3 sm:px-6 md:text-center">
							<span class="md:hidden font-bold text-xs uppercase text-slate-400 block mb-1">{L_IP}</span>
							<span class="font-mono text-xs">{log.IP}</span>
						</td>
						<td class="px-4 py-3 sm:px-6 md:text-center whitespace-nowrap">
							<span class="md:hidden font-bold text-xs uppercase text-slate-400 block mb-1">{L_TIME}</span>
							{log.DATE}
						</td>
						<td class="px-4 py-3 sm:px-6">
							<span class="md:hidden font-bold text-xs uppercase text-slate-400 block mb-1">{L_ACTION}</span>
							<div>{log.ACTION}</div>
							<!-- IF log.DATA --><div class="text-xs text-slate-500 mt-1">{log.DATA}</div><!-- ENDIF -->
						</td>
						<!-- IF S_CLEAR_ALLOWED -->
						<td class="px-4 py-3 sm:px-6 md:text-center absolute top-3 right-4 md:relative md:top-auto md:right-auto">
							<label class="flex items-center cursor-pointer justify-center">
								<input type="checkbox" name="mark[]" value="{log.ID}" class="rounded border-slate-300 text-primary focus:ring-primary h-4 w-4" />
								<span class="sr-only">{L_MARK}</span>
							</label>
						</td>
						<!-- ENDIF -->
					</tr>
				<!-- END log -->
			<!-- ELSE -->
				<tr>
					<td colspan="<!-- IF S_CLEAR_ALLOWED -->5<!-- ELSE -->4<!-- ENDIF -->" class="px-4 py-8 text-center text-slate-500 bg-slate-50/50 dark:bg-slate-800/50">
						{L_NO_ENTRIES}
					</td>
				</tr>
			<!-- ENDIF -->
				</tbody>
			</table>
		</div>

	<!-- IF .log -->
		<div class="border-t border-slate-200 bg-slate-50/50 px-4 py-3 sm:px-6 sm:py-4 dark:border-slate-700 dark:bg-slate-800/50 flex flex-col gap-4">
			<!-- INCLUDE display_options.html -->

			<div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 justify-between w-full border-t border-slate-200 dark:border-slate-700 pt-4">
				<div class="text-sm text-slate-600 dark:text-slate-400 font-medium">
					{TOTAL}
				</div>
				<!-- IF .pagination -->
					<!-- INCLUDE pagination.html -->
				<!-- ELSE -->
					<span class="text-sm font-bold text-slate-500 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-1 rounded-lg">{PAGE_NUMBER}</span>
				<!-- ENDIF -->
			</div>
		</div>

		{S_FORM_TOKEN}
	</div>

		<!-- IF S_CLEAR_ALLOWED -->
			<fieldset class="flex flex-col sm:flex-row items-center gap-3 mb-6 bg-slate-50 dark:bg-slate-800/50 p-4 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm">
				<input type="submit" name="action[del_all]" value="{L_DELETE_ALL}" class="w-full sm:w-auto rounded-lg border border-red-300 bg-white px-4 py-2 text-sm font-bold text-red-700 shadow-sm transition-colors hover:bg-red-50 focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-offset-2 dark:border-red-900/50 dark:bg-red-900/20 dark:text-red-400 dark:hover:bg-red-900/40 cursor-pointer" />
				<input type="submit" name="action[del_marked]" value="{L_DELETE_MARKED}" class="w-full sm:w-auto rounded-lg bg-red-600 px-4 py-2 text-sm font-bold text-white shadow-sm transition-colors hover:bg-red-700 focus:outline-none cursor-pointer" />

				<div class="w-full sm:w-auto sm:ml-auto flex flex-wrap items-center justify-center gap-2 text-sm font-medium">
					<a href="#" onclick="marklist('mcp', 'mark', true); return false;" class="text-primary hover:underline px-2 py-1">{L_MARK_ALL}</a>
					<span class="text-slate-300 dark:text-slate-600">::</span>
					<a href="#" onclick="marklist('mcp', 'mark', false); return false;" class="text-primary hover:underline px-2 py-1">{L_UNMARK_ALL}</a>
				</div>
			</fieldset>
		<!-- ENDIF -->
	<!-- ELSE -->
		{S_FORM_TOKEN}
	</div>
	<!-- ENDIF -->
</form>

<br />

<!-- INCLUDE mcp_footer.html -->
