<!-- INCLUDE mcp_header.html -->

<form method="post" id="mcp" action="{U_POST_ACTION}">

<h2 class="text-xl font-bold text-slate-900 dark:text-white mb-4">{L_WARN_USER}</h2>

<div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden mb-6">
	<div class="p-4 sm:p-6">

		<h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">{USERNAME_FULL}</h3>

		<div class="flex flex-col sm:flex-row items-start gap-4 sm:gap-6 bg-slate-50 dark:bg-slate-800/50 rounded-lg p-4 border border-slate-200 dark:border-slate-700">
			<!-- IF AVATAR_IMG -->
			<div class="shrink-0">
				<div class="rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-1">
					{AVATAR_IMG}
				</div>
			</div>
			<!-- ENDIF -->

			<div class="flex-1 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-y-3 gap-x-6 text-sm">
				<!-- IF RANK_TITLE -->
					<div class="flex flex-col">
						<span class="text-xs font-semibold text-slate-500 uppercase">{L_RANK}</span>
						<span class="font-medium text-slate-900 dark:text-white mt-0.5">{RANK_TITLE}</span>
					</div>
				<!-- ENDIF -->
				<!-- IF RANK_IMG -->
					<div class="flex flex-col">
						<!-- IF not RANK_TITLE --><span class="text-xs font-semibold text-slate-500 uppercase">{L_RANK}</span><!-- ENDIF -->
						<div class="mt-0.5">{RANK_IMG}</div>
					</div>
				<!-- ENDIF -->
				<div class="flex flex-col">
					<span class="text-xs font-semibold text-slate-500 uppercase">{L_JOINED}</span>
					<span class="font-medium text-slate-900 dark:text-white mt-0.5">{JOINED}</span>
				</div>
				<div class="flex flex-col">
					<span class="text-xs font-semibold text-slate-500 uppercase">{L_TOTAL_POSTS}</span>
					<span class="font-medium text-slate-900 dark:text-white mt-0.5">{POSTS}</span>
				</div>
				<div class="flex flex-col">
					<span class="text-xs font-semibold text-slate-500 uppercase">{L_WARNINGS}</span>
					<span class="font-medium text-slate-900 dark:text-white mt-0.5">{WARNINGS}</span>
				</div>
			</div>
		</div>

	</div>
</div>

<!-- EVENT mcp_warn_user_add_warning_field_before -->

<div class="bg-amber-50 dark:bg-amber-900/10 rounded-xl shadow-sm border border-amber-200 dark:border-amber-700/50 overflow-hidden mb-6">
	<div class="p-4 sm:p-6">

		<h3 class="text-lg font-bold text-amber-900 dark:text-amber-400 mb-2">{L_ADD_WARNING}</h3>
		<p class="text-sm text-amber-800 dark:text-amber-500 mb-4">{L_ADD_WARNING_EXPLAIN}</p>

		<fieldset class="space-y-4">
			<textarea name="warning" id="warning" class="w-full rounded-lg border border-amber-300 bg-white px-4 py-3 text-sm text-slate-900 focus:border-amber-500 focus:outline-none focus:ring-2 focus:ring-amber-500 dark:border-amber-700/50 dark:bg-slate-900 dark:text-white dark:focus:ring-amber-500" rows="3"></textarea>
			
			<!-- IF S_CAN_NOTIFY -->
			<div class="flex items-center gap-2 mt-4 bg-white dark:bg-slate-800/50 p-3 rounded-lg border border-amber-100 dark:border-amber-900/30">
				<input type="checkbox" name="notify_user" id="notify_user" checked="checked" class="rounded border-amber-300 text-amber-600 focus:ring-amber-500 h-4 w-4 bg-white dark:bg-slate-900" /> 
				<label for="notify_user" class="text-sm font-semibold text-amber-900 dark:text-amber-400 cursor-pointer">{L_NOTIFY_USER_WARN}</label>
			</div>
			<!-- ENDIF -->
		</fieldset>

	</div>
</div>

<!-- EVENT mcp_warn_user_add_warning_field_after -->

<fieldset class="flex justify-start mb-6">
	<input type="submit" name="action[add_warning]" value="{L_SUBMIT}" class="px-6 py-2.5 bg-amber-600 hover:bg-amber-700 text-white font-bold rounded-lg shadow-sm transition-colors cursor-pointer" />
	{S_FORM_TOKEN}
</fieldset>
</form>

<!-- INCLUDE mcp_footer.html -->
