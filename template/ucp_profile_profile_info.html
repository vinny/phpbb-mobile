<!-- INCLUDE ucp_header.html -->

<form id="ucp" method="post" action="{S_UCP_ACTION}"{S_FORM_ENCTYPE}>

	<div class="flex items-center justify-between mb-4 border-b border-primary/10 pb-4">
		<h2 class="text-base sm:text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
			<span class="material-symbols-outlined text-[20px] text-primary">person</span>
			{L_TITLE}
		</h2>
		<a href="{U_USER_PROFILE}" title="{L_VIEW_PROFILE}" class="text-xs font-semibold text-primary hover:text-primary/80 transition-colors uppercase tracking-wider bg-primary/10 px-2.5 py-1 rounded-lg">
			{L_VIEW_PROFILE}
		</a>
	</div>

	<p class="text-sm text-slate-500 dark:text-slate-400 mb-6 leading-relaxed bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800">
		{L_PROFILE_INFO_NOTICE}
	</p>

	<!-- IF ERROR -->
		<div class="mb-6 rounded-xl border border-red-200 bg-red-50 p-4 text-sm text-red-600 dark:border-red-900/30 dark:bg-red-900/10 dark:text-red-400 font-medium">
			{ERROR}
		</div>
	<!-- ENDIF -->

	<div class="space-y-5">
		<!-- EVENT ucp_profile_profile_info_before -->
		
		<!-- IF S_BIRTHDAYS_ENABLED -->
			<div class="flex flex-col gap-1.5">
				<label for="bday_day" class="text-sm font-medium text-slate-700 dark:text-slate-300">
					{L_BIRTHDAY}{L_COLON}{% EVENT ucp_profile_profile_info_birthday_label_append %}
					<span class="block text-xs text-slate-500 dark:text-slate-400 font-normal mt-0.5">{L_BIRTHDAY_EXPLAIN}</span>
				</label>
				<div class="flex flex-wrap items-center gap-3">
					<label for="bday_day" class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-2">
						{L_DAY}{L_COLON} 
						<select name="bday_day" id="bday_day" class="rounded-lg border border-slate-300 bg-slate-50 py-2 pl-3 pr-8 text-sm text-slate-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-600 dark:bg-slate-900/50 dark:text-white transition-colors">{S_BIRTHDAY_DAY_OPTIONS}</select>
					</label>
					<label for="bday_month" class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-2">
						{L_MONTH}{L_COLON} 
						<select name="bday_month" id="bday_month" class="rounded-lg border border-slate-300 bg-slate-50 py-2 pl-3 pr-8 text-sm text-slate-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-600 dark:bg-slate-900/50 dark:text-white transition-colors">{S_BIRTHDAY_MONTH_OPTIONS}</select>
					</label>
					<label for="bday_year" class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-2">
						{L_YEAR}{L_COLON} 
						<select name="bday_year" id="bday_year" class="rounded-lg border border-slate-300 bg-slate-50 py-2 pl-3 pr-8 text-sm text-slate-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-600 dark:bg-slate-900/50 dark:text-white transition-colors">{S_BIRTHDAY_YEAR_OPTIONS}</select>
					</label>
				</div>
			</div>
		<!-- ENDIF -->
		
		<!-- IF S_JABBER_ENABLED -->
			<div class="flex flex-col gap-1.5">
				<label for="jabber" class="text-sm font-medium text-slate-700 dark:text-slate-300">{L_UCP_JABBER}{L_COLON}</label>
				<div class="relative">
					<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
						<span class="material-symbols-outlined text-[20px]">chat</span>
					</span>
					<input type="email" name="jabber" id="jabber" maxlength="255" value="{JABBER}" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary text-sm text-slate-900 dark:text-white outline-none transition-all placeholder:text-slate-400" />
				</div>
			</div>
		<!-- ENDIF -->
		
		<!-- BEGIN profile_fields -->
			<div class="flex flex-col gap-1.5">
				<label <!-- IF profile_fields.FIELD_ID -->for="{profile_fields.FIELD_ID}"<!-- ENDIF --> class="block text-sm font-medium text-slate-700 dark:text-slate-300">
					{profile_fields.LANG_NAME}{L_COLON}<!-- IF profile_fields.S_REQUIRED --><span class="text-red-500">*</span><!-- ENDIF -->
					<!-- IF profile_fields.LANG_EXPLAIN -->
						<span class="block text-xs text-slate-500 dark:text-slate-400 font-normal mt-0.5">{profile_fields.LANG_EXPLAIN}</span>
					<!-- ENDIF -->
				</label>
				<!-- IF profile_fields.ERROR -->
					<div class="text-xs font-bold text-red-500 mb-1">{profile_fields.ERROR}</div>
				<!-- ENDIF -->
				<div class="[&>input]:w-full [&>input]:px-4 [&>input]:py-2.5 [&>input]:bg-slate-50 [&>input]:dark:bg-slate-900/50 [&>input]:border [&>input]:border-slate-300 [&>input]:dark:border-slate-600 [&>input]:rounded-lg [&>input]:focus:ring-1 [&>input]:focus:ring-primary [&>input]:focus:border-primary [&>input]:text-sm [&>input]:text-slate-900 [&>input]:dark:text-white [&>input]:transition-all [&>textarea]:w-full [&>textarea]:px-4 [&>textarea]:py-2.5 [&>textarea]:bg-slate-50 [&>textarea]:dark:bg-slate-900/50 [&>textarea]:border [&>textarea]:border-slate-300 [&>textarea]:dark:border-slate-600 [&>textarea]:rounded-lg [&>textarea]:focus:ring-1 [&>textarea]:focus:ring-primary [&>textarea]:focus:border-primary [&>textarea]:text-sm [&>textarea]:text-slate-900 [&>textarea]:dark:text-white [&>textarea]:transition-all [&>select]:rounded-lg [&>select]:border [&>select]:border-slate-300 [&>select]:bg-slate-50 [&>select]:py-2 [&>select]:pl-3 [&>select]:pr-8 [&>select]:text-sm [&>select]:text-slate-900 [&>select]:focus:border-primary [&>select]:focus:outline-none [&>select]:focus:ring-1 [&>select]:focus:ring-primary [&>select]:dark:border-slate-600 [&>select]:dark:bg-slate-900/50 [&>select]:dark:text-white [&>select]:transition-colors">
					{profile_fields.FIELD}
				</div>
			</div>
		<!-- END profile_fields -->
		
		<!-- EVENT ucp_profile_profile_info_after -->
	</div>

	<div class="mt-8 flex flex-col sm:flex-row sm:justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-700/50">
		<input type="reset" value="{L_RESET}" name="reset" class="w-full sm:w-auto py-3 sm:py-2 px-6 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-semibold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700 cursor-pointer" />
		<input type="submit" name="submit" value="{L_SUBMIT}" class="w-full sm:w-auto py-3 sm:py-2 px-6 rounded-lg bg-primary text-white font-semibold text-sm shadow-sm hover:bg-primary/90 transition-colors cursor-pointer" />
		{S_HIDDEN_FIELDS}
		{S_FORM_TOKEN}
	</div>

</form>

<!-- INCLUDE ucp_footer.html -->
