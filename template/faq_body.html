<!-- INCLUDE overall_header.html -->

<main class="py-6 px-4">
	<header class="flex items-center gap-3 mb-6">
		<span class="material-symbols-outlined text-[28px] text-primary">live_help</span>
		<h2 class="text-2xl font-bold text-slate-800 dark:text-white">{L_FAQ_TITLE}</h2>
	</header>

	<div class="rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-700 dark:bg-slate-800 overflow-hidden mb-8" id="faqlinks">
		<div class="p-6">
			<div class="columns-1 md:columns-2 gap-8">
				<!-- BEGIN faq_block -->
				<div class="break-inside-avoid mb-6 last:mb-0">
					<h3 class="text-base font-bold text-slate-800 dark:text-slate-200 pb-2 mb-3 border-b border-primary/10">{faq_block.BLOCK_TITLE}</h3>
					<ul class="flex flex-col gap-2">
						<!-- BEGIN faq_row -->
						<li>
							<a href="#f{faq_block.S_ROW_COUNT}r{faq_block.faq_row.S_ROW_COUNT}" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors flex items-start gap-2 group">
								<span class="material-symbols-outlined text-[16px] mt-[2px] text-slate-400 shrink-0 group-hover:text-primary transition-colors">help_outline</span>
								<span class="leading-snug">{faq_block.faq_row.FAQ_QUESTION}</span>
							</a>
						</li>
						<!-- END faq_row -->
					</ul>
				</div>
				<!-- END faq_block -->
			</div>
		</div>
	</div>

	<div class="flex flex-col gap-6">
		<!-- BEGIN faq_block -->
		<section class="rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-700 dark:bg-slate-800 overflow-hidden">
			<div class="border-b border-slate-200 bg-slate-50/50 px-6 py-4 dark:border-slate-700 dark:bg-slate-800/50">
				<h2 class="text-lg font-bold text-slate-800 dark:text-slate-200 flex items-center gap-2">
					<span class="material-symbols-outlined text-[20px] text-primary">menu_book</span>
					{faq_block.BLOCK_TITLE}
				</h2>
			</div>
			
			<div class="flex flex-col divide-y divide-slate-100 dark:divide-slate-700/50">
				<!-- BEGIN faq_row -->
				<div class="p-6 transition-colors hover:bg-slate-50/50 dark:hover:bg-slate-800/30">
					<h3 id="f{faq_block.S_ROW_COUNT}r{faq_block.faq_row.S_ROW_COUNT}" class="text-base font-bold text-slate-800 dark:text-slate-200 mb-3 flex gap-2">
						<span class="material-symbols-outlined text-[20px] text-primary shrink-0 mt-[2px]">help</span>
						{faq_block.faq_row.FAQ_QUESTION}
					</h3>
					<div class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed mb-4 sm:ml-7 prose prose-sm prose-slate dark:prose-invert max-w-none">
						{faq_block.faq_row.FAQ_ANSWER}
					</div>
					<div class="flex justify-end mt-2">
						<a href="#faqlinks" class="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-slate-500 hover:text-primary transition-colors bg-slate-100 dark:bg-slate-700/50 px-3 py-1.5 rounded-full hover:bg-primary/10 dark:hover:bg-primary/20 cursor-pointer shadow-sm">
							<span class="material-symbols-outlined text-[16px]">keyboard_arrow_up</span>
							{L_BACK_TO_TOP}
						</a>
					</div>
				</div>
				<!-- END faq_row -->
			</div>
		</section>
		<!-- END faq_block -->
	</div>
</main>

<div class="px-4 mt-6">
	<!-- INCLUDE jumpbox.html -->
</div>

<!-- INCLUDE overall_footer.html -->
