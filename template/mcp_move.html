<!-- IF S_AJAX_REQUEST -->

	<h3 class="text-xl font-bold text-slate-800 dark:text-slate-200 mb-2">{MESSAGE_TITLE}</h3>
	<p class="text-sm text-slate-600 dark:text-slate-400 mb-4">{MESSAGE_TEXT}</p>

	<!-- IF ADDITIONAL_MSG -->
	<div class="mb-4 rounded-lg bg-primary/10 p-3 text-sm font-medium text-primary border border-primary/20 dark:bg-primary/20 dark:text-primary-light">
		{ADDITIONAL_MSG}
	</div>
	<!-- ENDIF -->

	<div class="flex flex-col gap-4">
		<div class="flex flex-col gap-2">
			<label class="text-sm font-bold text-slate-800 dark:text-slate-200">{L_SELECT_DESTINATION_FORUM}{L_COLON}</label>
			<div class="relative">
				<select name="to_forum_id" class="w-full appearance-none rounded-lg border border-slate-300 bg-white pl-4 pr-10 py-2.5 text-sm font-medium text-slate-700 shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-600 dark:bg-slate-900 dark:text-slate-300">
					{S_FORUM_SELECT}
				</select>
				<span class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400">
					<span class="material-symbols-outlined">expand_more</span>
				</span>
			</div>
		</div>

		<div class="flex flex-col gap-3 mt-2">
			<!-- IF S_CAN_LEAVE_SHADOW -->
				<label for="move_leave_shadow" class="flex items-center gap-2 cursor-pointer group">
					<input type="checkbox" name="move_leave_shadow" id="move_leave_shadow" class="rounded border-slate-300 text-primary focus:ring-primary h-4 w-4" />
					<span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 dark:text-slate-300 dark:group-hover:text-white">{L_LEAVE_SHADOW}</span>
				</label>
			<!-- ENDIF -->

			<!-- IF S_CAN_LOCK_TOPIC -->
				<label for="move_lock_topics" class="flex items-center gap-2 cursor-pointer group">
					<input type="checkbox" name="move_lock_topics" id="move_lock_topics" class="rounded border-slate-300 text-primary focus:ring-primary h-4 w-4" />
					<span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 dark:text-slate-300 dark:group-hover:text-white">{L_LOCK_TOPIC}</span>
				</label>
			<!-- ENDIF -->
		</div>

		<fieldset class="flex items-center gap-3 mt-4 pt-4 border-t border-slate-100 dark:border-slate-700/50">
			<input type="button" name="confirm" value="{YES_VALUE}" class="w-full sm:w-auto rounded-lg bg-primary px-6 py-2.5 text-sm font-bold text-white shadow-sm transition-colors hover:bg-primary/90 focus:outline-none cursor-pointer" />
			<input type="button" name="cancel" value="{L_NO}" class="w-full sm:w-auto rounded-lg border border-slate-300 bg-white px-6 py-2.5 text-sm font-bold text-slate-700 shadow-sm transition-colors hover:bg-slate-50 focus:outline-none dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700 cursor-pointer" />
		</fieldset>
	</div>

<!-- ELSE -->

<!-- INCLUDE overall_header.html -->

<!-- EVENT mcp_move_before -->

<form id="confirm" action="{S_CONFIRM_ACTION}" method="post">
	
	<div class="rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-700 dark:bg-slate-800 overflow-hidden max-w-3xl mx-auto my-8">
		<div class="border-b border-slate-100 bg-slate-50/50 px-6 py-5 dark:border-slate-700/50 dark:bg-slate-800/50 flex items-center gap-3">
			<span class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/10 text-primary dark:bg-primary/20 dark:text-primary-light shrink-0">
				<span class="material-symbols-outlined text-[24px]">moving</span>
			</span>
			<h2 class="text-xl font-bold text-slate-800 dark:text-slate-200">{MESSAGE_TITLE}</h2>
		</div>

		<div class="p-6 flex flex-col gap-6">
			<!-- IF ADDITIONAL_MSG -->
			<div class="rounded-lg bg-primary/5 p-4 text-sm font-medium text-slate-800 border border-primary/20 dark:bg-primary/10 dark:border-primary/30 dark:text-slate-200 flex items-start gap-2">
				<span class="material-symbols-outlined text-[20px] text-primary shrink-0 mt-0.5">info</span>
				<p>{ADDITIONAL_MSG}</p>
			</div>
			<!-- ENDIF -->

			<p class="text-base text-slate-700 dark:text-slate-300 font-medium">{MESSAGE_TEXT}</p>

			<fieldset class="flex flex-col gap-5 border-t border-slate-100 dark:border-slate-700/50 pt-5">
			{% EVENT mcp_move_destination_forum_before %}
			<div class="flex flex-col gap-2">
				<label class="text-sm font-bold text-slate-800 dark:text-slate-200">{L_SELECT_DESTINATION_FORUM}{L_COLON}</label>
				<div class="relative w-full">
					<select name="to_forum_id" class="w-full appearance-none rounded-lg border border-slate-300 bg-white pl-4 pr-10 py-2.5 text-sm font-medium text-slate-700 shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-600 dark:bg-slate-900 dark:text-slate-300 cursor-pointer">
						{S_FORUM_SELECT}
					</select>
					<span class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
						<span class="material-symbols-outlined text-slate-400">expand_more</span>
					</span>
				</div>
			</div>

			<div class="flex flex-col gap-3 mt-2">
				<!-- IF S_CAN_LEAVE_SHADOW -->
				<label for="move_leave_shadow" class="flex items-center gap-3 cursor-pointer group">
					<input type="checkbox" name="move_leave_shadow" id="move_leave_shadow" class="rounded border-slate-300 text-primary focus:ring-primary h-5 w-5" />
					<span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 dark:text-slate-300 dark:group-hover:text-white">{L_LEAVE_SHADOW}</span>
				</label>
				<!-- ENDIF -->
				<!-- IF S_CAN_LOCK_TOPIC -->
				<label for="move_lock_topics" class="flex items-center gap-3 cursor-pointer group">
					<input type="checkbox" name="move_lock_topics" id="move_lock_topics" class="rounded border-slate-300 text-primary focus:ring-primary h-5 w-5" />
					<span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 dark:text-slate-300 dark:group-hover:text-white">{L_LOCK_TOPIC}</span>
				</label>
				<!-- ENDIF -->
			</div>
			{% EVENT mcp_move_destination_forum_after %}
			</fieldset>
		</div>

		<div class="bg-slate-50 px-6 py-4 dark:bg-slate-800/50 flex flex-col sm:flex-row items-center gap-3 border-t border-slate-100 dark:border-slate-700/50">
			{S_HIDDEN_FIELDS}
			<input type="submit" name="confirm" value="{YES_VALUE}" class="w-full sm:w-auto flex-1 sm:flex-none justify-center rounded-lg bg-primary px-6 py-2.5 text-sm font-bold text-white shadow-sm transition-colors hover:bg-primary/90 focus:outline-none cursor-pointer" />
			<input type="submit" name="cancel" value="{L_NO}" class="w-full sm:w-auto flex-1 sm:flex-none justify-center rounded-lg border border-slate-300 bg-white px-6 py-2.5 text-sm font-bold text-slate-700 shadow-sm transition-colors hover:bg-slate-50 focus:outline-none dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700 cursor-pointer" />
			{S_FORM_TOKEN}
		</div>
	</div>

</form>

<!-- INCLUDE overall_footer.html -->
<!-- ENDIF -->
